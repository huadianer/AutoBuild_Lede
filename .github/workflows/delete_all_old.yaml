name: 'Delete old artifacts'
on:
  push: 
    branches:
      - master
  schedule:
    - cron: 0 5 * * *

jobs:
  delete-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: kolpav/purge-artifacts-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          expire-in: 2days 

      - uses: sgpublic/delete-release-action@v1.1
        with:
          # repo: '<owner>/<repoName>' # you can input a another repo here, defaults to current repo
          release-drop: true
          release-keep-count: 5
          release-drop-tag: true
          pre-release-drop: false
          pre-release-keep-count: 3
          pre-release-drop-tag: false
          draft-drop: true
          draft-drop-count: 5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}